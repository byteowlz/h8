"$schema" = "https://raw.githubusercontent.com/byteowlz/schemas/refs/heads/main/h8/h8.config.schema.json"

# h8 configuration (Rust CLI)
# Place this at ~/.config/h8/config.toml or $XDG_CONFIG_HOME/h8/config.toml

# Default email account
account = "your.email@example.com"

# Timezone for calendar operations
timezone = "Europe/Berlin"

# Service endpoint
service_url = "http://127.0.0.1:8787"

# Calendar display settings
[calendar]
# Default view for agenda/free/ppl commands
# Options: "list" (detailed), "gantt" (timeline), "compact" (grouped by date)
default_view = "list"

# Free slots configuration
[free_slots]
# Only consider times between these hours (24h format)
start_hour = 9
end_hour = 17

# Exclude weekends when finding free slots
exclude_weekends = true

# Mail configuration
[mail]
# Override data directory for mail storage (default: $XDG_DATA_HOME/h8/mail)
# data_dir = "~/.local/share/h8/mail"

# Editor command for composing (default: $EDITOR)
# editor = "nvim"

# Pager for reading messages
pager = "less -R"

# Folders to sync
sync_folders = ["inbox", "sent", "drafts"]

# Email signature (use multi-line string)
signature = '''
--
Your Name
'''

[mail.compose]
# Format for composing emails (text or html)
format = "text"

# Quote prefix style for replies
quote_style = "> "

# Include signature in new messages
include_signature = true

# People aliases for calendar commands
# Map short names to full email addresses for use with 'h8 ppl' commands
# Example: h8 ppl free alice -> looks up alice's free slots
[people]
# alice = "alice.smith@example.com"
# bob = "bob.jones@example.com"

# Resource groups for shared bookable resources
# Each [resources.<group>] section defines a group (cars, rooms, equipment, etc.)
# Resources can be simple (email only) or detailed (email + description)
[resources.cars]
# car1 = "resource.car1@example.com"
# car2 = { email = "resource.car2@example.com", desc = "Toyota Camry, ABC-1234" }

[resources.rooms]
# conf-a = { email = "room.conf-a@example.com", desc = "Conference Room A (10 seats)" }
# conf-b = { email = "room.conf-b@example.com", desc = "Conference Room B (6 seats)" }

# Trip planning configuration
[trip]
# Default origin location alias (must match a key in [trip.locations.*])
default_origin = "work"

# Buffer minutes to add before/after calculated travel time
buffer_minutes = 15

# Round car travel durations up to nearest N minutes (0 = no rounding)
# E.g., 15 rounds 4h22m -> 4h30m; 30 rounds -> 4h30m; 60 rounds -> 5h
round_minutes = 15

# Car routing provider: "osrm" (free, global, no API key)
car_provider = "osrm"

# Public transit provider: "db" (Deutsche Bahn, Germany)
# More providers planned: "sbb" (Switzerland), "sncf" (France), etc.
transit_provider = "db"

# Optional country code (ISO 3166-1 alpha-2) to bias geocoding results
# Set to null or omit for worldwide search
# country = "de"

# OpenRouteService API key (only if car_provider = "openrouteservice")
# openrouteservice_key = "your-api-key"

# Named locations for trip origins/destinations
# Each location needs address, lat, lon; station is optional (for transit)
[trip.locations.work]
address = "123 Main St, Your City"
lat = 51.5074
lon = -0.1278
station = "London Paddington"

[trip.locations.home]
address = "456 Oak Ave, Your Suburb"
lat = 51.4
lon = -0.2
